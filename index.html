<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Governance — Straat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky1: #b8e4f0; --sky2: #dff0f8;
  --road: #6b7280; --road-line: #e5e7eb;
  --pavement: #9ca3af; --grass: #86efac;
  --green-dark: #1b3a20; --green-mid: #2e7d32; --green-light: #4caf50;
  --cream: #fefce8;
  --font-d: 'Playfair Display', Georgia, serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,0.13);
}
html, body { height: 100%; overflow: hidden; font-family: var(--font-b); }
body { background: var(--sky1); }

/* ══ TOPBAR ══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 52px; background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem;
}
.top-logo { font-family: var(--font-d); font-size: 17px; font-weight: 900; color: var(--green-dark); }
.top-visited { display: flex; gap: 4px; flex: 1; }
.vis-dot {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  background: rgba(255,255,255,0.5); transition: all 0.3s;
}
.vis-dot.done { background: var(--green-mid); border-color: var(--green-mid); }
.top-chart-btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 16px;
  background: var(--green-mid); color: #fff; border: none; border-radius: 50px;
  font-family: var(--font-b); font-size: 12px; font-weight: 600; cursor: pointer;
  box-shadow: 0 2px 8px rgba(46,125,50,0.35); transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}
.top-chart-btn:hover { background: #1b5e20; transform: translateY(-1px); }

/* ══ SCREENS ══ */
.screen { position: fixed; inset: 0; display: none; }
.screen.active { display: flex; }

/* ══ IMAGE BACKGROUND SCREENS ══ */
.bg-screen {
  background: #ffffff;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
.bg-screen-inner {
  position: relative;
  height: 100%;
  width: auto;
  flex-shrink: 0;
}
.bg-screen-inner img {
  height: 100%; width: auto; display: block;
  user-select: none; pointer-events: none;
}
.hit-area {
  position: absolute;
  cursor: pointer;
  border-radius: 14px;
}
.hit-check {
  position: absolute; top: 10px; right: 10px;
  width: 30px; height: 30px; border-radius: 50%;
  background: #2e7d32; color: #fff;
  display: none; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700;
  box-shadow: 0 2px 10px rgba(46,125,50,0.45);
  pointer-events: none;
}
.building-hit.has-card .hit-check { display: flex; }

/* ══ BACKGROUND IMAGE FRAME + HOTSPOTS ══ */
.bg-frame {
  position: relative;
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
  flex-shrink: 0;
}
.hotspot {
  position: absolute;
  cursor: pointer;
  background: rgba(255,255,255,0);
  transition: background 0.15s, box-shadow 0.15s;
  border-radius: 14px;
}
.hotspot:hover {
  background: rgba(255,255,255,0.16);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.35) inset;
}
.hotspot-check {
  position: absolute; top: 6px; right: 6px;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--green-mid); color: #fff;
  display: none; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.building-hotspot.visited .hotspot-check { display: flex; }

#streetScreen { align-items: center; justify-content: center; background: #b8e4f0; overflow: hidden; }

/* ══ ENTER ANIMATION ══ */
.enter-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0);
  pointer-events: none; z-index: 10; transition: background 0.4s;
}
.entering .enter-overlay { background: rgba(0,0,0,0.7); }

/* ══ INSIDE SCREEN ══ */
#insideScreen {
  flex-direction: column; background: var(--cream);
  overflow-y: auto;
}
.inside-header {
  padding: 1.5rem 2rem 1rem;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex; align-items: center; gap: 1rem;
  flex-shrink: 0;
}
.inside-icon { font-size: 40px; }
.inside-header-text h2 { font-family: var(--font-d); font-size: 22px; color: var(--green-dark); }
.inside-header-text p  { font-size: 13px; color: #6b8870; margin-top: 2px; }
.back-btn {
  margin-left: auto; display: flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 600; color: var(--green-mid);
  background: transparent; border: 2px solid rgba(46,125,50,0.3); border-radius: 50px;
  padding: 7px 16px; cursor: pointer; transition: background 0.2s;
}
.back-btn:hover { background: #e8f5e9; }

.inside-body { padding: 1.5rem 2rem; max-width: 900px; margin: 0 auto; width: 100%; }
.inside-instruction { font-size: 14px; color: #6b8870; margin-bottom: 1.25rem; }

/* CARD GRID inside */
.cards-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem;
  margin-bottom: 2rem;
}

.card {
  border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.13);
  cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, opacity 0.15s;
  position: relative; user-select: none; display: flex; flex-direction: column;
  overflow: hidden; aspect-ratio: 2.5 / 3.7; border: 2.5px solid transparent;
}
.card:hover:not(.disabled):not(.clash) { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 36px rgba(0,0,0,0.18); }
.card.selected { border-color: var(--green-mid); box-shadow: 0 0 0 3px var(--green-mid), 0 8px 28px rgba(46,125,50,0.30); transform: translateY(-4px) scale(1.01); }
.card.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
.card.clash    { opacity: 0.22; cursor: not-allowed; pointer-events: none; border-color: rgba(211,47,47,0.4); }

.card-hdr { padding: 14px 14px 6px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.card-hdr-icon { font-size: 22px; }
.card-num { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45); }

.card-icon-wrap { display: flex; justify-content: center; padding: 4px 0 6px; flex-shrink: 0; }
.card-big-icon { font-size: 38px; background: rgba(255,255,255,0.2); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.card-body { background: #fff; padding: 10px 14px 8px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.card-title { font-family: var(--font-d); font-size: 17px; font-weight: 700; color: var(--green-dark); line-height: 1.2; text-align: center; }
.card-desc  { font-size: 11.5px; color: #6b8870; line-height: 1.4; text-align: center; }
.card-impacts { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; padding: 4px 0 2px; }
.impact-pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-align: center; width: 100%; }

.card-badge { position: absolute; top: -1px; right: 10px; width: 24px; height: 24px; background: var(--green-mid); border-radius: 0 0 8px 8px; display: none; align-items: center; justify-content: center; }
.card.selected .card-badge { display: flex; }
.card-badge svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 2.5; fill: none; }

.clash-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(211,47,47,0.88); color: #fff; font-size: 9px; font-weight: 700; text-align: center; padding: 4px 6px; line-height: 1.3; display: none; }
.card.clash .clash-bar { display: block; }

.inside-next-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--green-mid); color: #fff; border: none; border-radius: 50px;
  font-family: var(--font-b); font-size: 14px; font-weight: 600;
  padding: 12px 28px; cursor: pointer; margin: 0 auto;
  box-shadow: 0 4px 16px rgba(46,125,50,0.35); transition: background 0.2s, transform 0.15s;
  opacity: 0.4; pointer-events: none;
}
.inside-next-btn.ready { opacity: 1; pointer-events: auto; }
.inside-next-btn:hover { background: #1b5e20; transform: translateY(-2px); }

/* ══ RESULTS SCREEN ══ */
#resultsScreen {
  flex-direction: column; background: var(--cream); overflow-y: auto;
}
.results-header {
  padding: 2rem 2rem 1.25rem; border-bottom: 1px solid rgba(0,0,0,0.08);
}
.results-header h1 { font-family: var(--font-d); font-size: 30px; color: var(--green-dark); margin-bottom: 4px; }
.results-header p  { font-size: 14px; color: #6b8870; }

.results-body { padding: 1.5rem 2rem 3rem; max-width: 1100px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

.panel-box { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.06); padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.panel-box h2 { font-family: var(--font-d); font-size: 18px; color: var(--green-dark); margin-bottom: 1rem; }

/* dual charts */
.dual-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.chart-col { display: flex; flex-direction: column; align-items: center; }
.chart-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.chart-lbl.goal   { color: #1565c0; }
.chart-lbl.result { color: var(--green-mid); }
.polar-wrap { position: relative; width: 100%; padding-bottom: 100%; }
.polar-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

.match-section { margin: 0.75rem 0; }
.match-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.match-header span:first-child { font-size: 11px; font-weight: 700; color: var(--green-mid); text-transform: uppercase; letter-spacing: 0.06em; }
.match-pct { font-family: var(--font-d); font-size: 28px; font-weight: 900; color: var(--green-dark); }
.match-track { height: 12px; background: #f0fdf4; border-radius: 6px; overflow: hidden; border: 1px solid rgba(46,125,50,0.15); }
.match-fill  { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

.r-legend { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 0.75rem; }
.r-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #6b8870; }

.personal-summary {
  margin-top: 1.25rem;
  border-top: 1px solid rgba(46,125,50,0.12);
  padding-top: 1rem;
}
.personal-summary-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700; color: #1b3a20;
  margin-bottom: 0.75rem; display: flex; align-items: center; gap: 7px;
}
.personal-summary-cards {
  display: flex; flex-direction: column; gap: 8px;
}
.summary-item {
  display: flex; gap: 10px; align-items: flex-start;
  background: #f8fdf8; border-radius: 10px;
  border: 1px solid rgba(46,125,50,0.1);
  padding: 10px 12px;
}
.summary-icon { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
.summary-text { flex: 1; }
.summary-card-title { font-size: 11px; font-weight: 700; color: #2e7d32; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.summary-card-personal { font-size: 12.5px; color: #374151; line-height: 1.55; }
.ldot { width: 7px; height: 7px; border-radius: 50%; }

/* picks */
.picks-card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 0.75rem;
}
.result-card {
  border-radius: 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  display: flex; flex-direction: column;
  overflow: hidden; aspect-ratio: 2.5 / 3.5;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.result-card-hdr {
  padding: 8px 9px 5px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.result-card-icon {
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; padding: 4px 0 2px; flex-shrink: 0;
  background: rgba(255,255,255,0.15);
}
.result-card-body {
  background: #fff; padding: 7px 9px 6px;
  flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 0;
}
.result-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 12px; font-weight: 700; color: #1b3a20;
  line-height: 1.2; text-align: center;
}
.result-card-desc {
  font-size: 9px; color: #6b8870; line-height: 1.3; text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.result-card-impacts {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 2px;
}
.pick-card-full { background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; overflow: hidden; }
.pick-stripe { width: 7px; flex-shrink: 0; }
.pick-content { padding: 10px 12px; flex: 1; }
.pick-cat   { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #9ac09e; margin-bottom: 2px; }
.pick-title { font-family: var(--font-d); font-size: 15px; font-weight: 700; color: var(--green-dark); margin-bottom: 2px; }
.pick-desc  { font-size: 11px; color: #6b8870; line-height: 1.35; margin-bottom: 5px; }
.pick-pills { display: flex; flex-wrap: wrap; gap: 3px; }
.pick-pill  { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
.pick-icon  { width: 44px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }

/* bars */
.bars-full { grid-column: 1 / -1; }
.theme-scores { display: flex; flex-direction: column; gap: 10px; }
.th-row { display: flex; align-items: center; gap: 10px; }
.th-icon { font-size: 16px; flex-shrink: 0; }
.th-name { font-size: 13px; font-weight: 600; color: var(--green-mid); width: 120px; flex-shrink: 0; }
.th-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.b-row { display: flex; align-items: center; gap: 6px; }
.b-tag { font-size: 9px; font-weight: 700; color: #9ac09e; width: 28px; text-align: right; flex-shrink: 0; }
.b-bg  { flex: 1; height: 6px; background: #f0fdf4; border-radius: 3px; overflow: hidden; }
.b-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.b-val { font-size: 12px; font-weight: 700; width: 20px; text-align: right; flex-shrink: 0; }

.restart-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 1rem;
  font-family: var(--font-b); font-size: 13px; font-weight: 600;
  color: var(--green-mid); background: #e8f5e9; border: 2px solid rgba(46,125,50,0.25);
  border-radius: 50px; padding: 9px 20px; cursor: pointer; transition: background 0.2s;
}
.restart-btn:hover { background: #c8e6c9; }

/* ══ CARD INFO POPUP ══ */
.popup-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0); backdrop-filter: blur(0px);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem; pointer-events: none;
  transition: background 0.25s, backdrop-filter 0.25s;
}
.popup-overlay.open {
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  pointer-events: auto;
}
.popup-box {
  background: #fff; border-radius: 20px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  max-width: 520px; width: 100%;
  transform: translateY(24px) scale(0.96);
  opacity: 0; transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
  overflow: hidden;
}
.popup-overlay.open .popup-box {
  transform: translateY(0) scale(1); opacity: 1;
}
.popup-card-header {
  padding: 1.5rem 1.5rem 1rem;
  display: flex; align-items: flex-start; gap: 1rem;
}
.popup-big-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.popup-header-text { flex: 1; }
.popup-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #9ac09e; margin-bottom: 3px; }
.popup-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 900; color: #1b3a20; line-height: 1.2; margin-bottom: 4px; }
.popup-desc { font-size: 13px; color: #6b8870; line-height: 1.5; }
.popup-close {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: #f3f4f6; cursor: pointer; font-size: 16px; color: #6b7280;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s;
}
.popup-close:hover { background: #e5e7eb; }

.popup-info {
  padding: 0 1.5rem 1rem;
  font-size: 13.5px; color: #374151; line-height: 1.7;
  border-top: 1px solid #f3f4f6; padding-top: 1rem;
}

.popup-personal {
  margin: 0 1.5rem 1rem;
  background: linear-gradient(135deg, #e8f5e9, #f1f8f2);
  border: 1.5px solid rgba(46,125,50,0.2);
  border-radius: 12px;
  padding: 1rem 1.25rem;
}
.popup-personal-label {
  font-size: 12px; font-weight: 800; color: #2e7d32;
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 0.5rem;
}
.popup-personal-text {
  font-size: 13.5px; color: #1b3a20; line-height: 1.7;
}

.popup-impacts {
  padding: 0.75rem 1.5rem;
  display: flex; flex-wrap: wrap; gap: 5px;
  border-top: 1px solid #f3f4f6;
}

.popup-actions {
  padding: 1rem 1.5rem 1.5rem;
  display: flex; gap: 0.75rem;
  border-top: 1px solid #f3f4f6;
}
.popup-btn-back {
  flex: 1; padding: 12px; border-radius: 50px; border: 2px solid rgba(46,125,50,0.3);
  background: transparent; color: #2e7d32; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.popup-btn-back:hover { background: #e8f5e9; }
.popup-btn-claim {
  flex: 2; padding: 12px; border-radius: 50px; border: none;
  background: #2e7d32; color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 14px rgba(46,125,50,0.35);
  transition: background 0.2s, transform 0.15s;
}
.popup-btn-claim:hover { background: #1b5e20; transform: translateY(-1px); }

@media (max-width: 800px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .results-body { grid-template-columns: 1fr; }
  .dual-charts { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 500px) {
  .cards-grid { grid-template-columns: 1fr; }
}

/* ══ START SCREEN ══ */
#startScreen {
  background: #b8e4f0;
  align-items: center; justify-content: center;
  overflow: hidden;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen active bg-screen" id="startScreen">
  <div class="bg-screen-inner">
    <img src="images/start-bg.png" alt="Food Governance start" draggable="false">
    <div class="hit-area" style="left:11.4%;top:69.5%;width:17.8%;height:8.6%" onclick="startGame()" title="Start"></div>
  </div>
</div>

<!-- STREET SCREEN -->
<div class="screen bg-screen" id="streetScreen">
  <div class="bg-screen-inner">
    <img src="images/street-bg.png" alt="Food Governance straat" draggable="false">

    <div class="hit-area building-hit" data-cat="gezondheid" style="left:0%;top:22%;width:19%;height:78%" onclick="enterBuilding('gezondheid')" title="Gezondheid">
      <div class="hit-check">✓</div>
    </div>
    <div class="hit-area building-hit" data-cat="eerlijkeketen" style="left:17%;top:27%;width:16%;height:73%" onclick="enterBuilding('eerlijkeketen')" title="Eerlijke keten">
      <div class="hit-check">✓</div>
    </div>
    <div class="hit-area building-hit" data-cat="inclusiviteit" style="left:32%;top:24%;width:17%;height:76%" onclick="enterBuilding('inclusiviteit')" title="Inclusiviteit">
      <div class="hit-check">✓</div>
    </div>
    <div class="hit-area building-hit" data-cat="biodiversiteit" style="left:48%;top:0%;width:20%;height:100%" onclick="enterBuilding('biodiversiteit')" title="Biodiversiteit">
      <div class="hit-check">✓</div>
    </div>
    <div class="hit-area building-hit" data-cat="emissies" style="left:66%;top:27%;width:18%;height:73%" onclick="enterBuilding('emissies')" title="Emissies">
      <div class="hit-check">✓</div>
    </div>

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let selectedCards = {}; // catId -> cardId
let visitedBuildings = new Set();
let currentBuilding = null;

function getSelectedIds() { return Object.values(selectedCards); }

function getBlockedIds() {
  const blocked = new Map();
  getSelectedIds().forEach(id => {
    const card = CARDS.find(c => c.id === id);
    if (!card) return;
    card.clashes.forEach(cid => { if (!blocked.has(cid)) blocked.set(cid, card.clashReason||'Incompatibel'); });
  });
  return blocked;
}

function getScores() {
  const s = {};
  THEMES.forEach(t => s[t] = BASELINE);
  getSelectedIds().forEach(id => {
    const card = CARDS.find(c => c.id === id);
    if (!card) return;
    Object.entries(card.impacts).forEach(([t,v]) => { s[t] = (s[t]||BASELINE) + v; });
  });
  return s;
}
function clamp(v, lo=0, hi=10) { return Math.max(lo, Math.min(hi, v)); }
function calcMatch(scores) {
  let diff = 0;
  THEMES.forEach(t => diff += Math.abs(clamp(scores[t]) - GOAL[t]));
  return Math.round((1 - diff / (THEMES.length * 10)) * 100);
}
function matchColor(pct) {
  if (pct >= 80) return '#6ab04c';
  if (pct >= 60) return '#f0c040';
  if (pct >= 40) return '#e8613a';
  return '#b71c1c';
}

/* ══════════════════════════════════
   BUILDING RENDERER (SVG-like via HTML)
══════════════════════════════════ */
function renderStreet() {
  BUILDINGS.forEach(b => {
    const el = document.querySelector(`.building-hit[data-cat="${b.id}"]`);
    if (!el) return;
    el.classList.toggle('has-card', !!selectedCards[b.id]);
  });
}

/* ══════════════════════════════════
   NAVIGATION
══════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  renderStreet();
  showScreen('streetScreen');
}

function enterBuilding(catId) {
  currentBuilding = catId;
  visitedBuildings.add(catId);
  renderInsideScreen(catId);
  showScreen('insideScreen');
  renderStreet();
}

function leaveBuilding() {
  showScreen('streetScreen');
  renderStreet();
  // check if all visited
  if (visitedBuildings.size === BUILDINGS.length) {
    setTimeout(() => {
      const allDone = BUILDINGS.every(b => selectedCards[b.id]);
      if (allDone) showResults();
    }, 400);
  }
}

function showResults() {
  renderResults();
  showScreen('resultsScreen');
}

function restartGame() {
  selectedCards = {};
  visitedBuildings = new Set();
  currentBuilding = null;
  renderStreet();
  showScreen('startScreen');
}

/* ══════════════════════════════════
   INSIDE SCREEN
══════════════════════════════════ */
function renderInsideScreen(catId) {
  const b = BUILDINGS.find(x => x.id === catId);
  const catCards = CARDS.filter(c => c.cat === catId);
  const blocked  = getBlockedIds();
  const selCard  = selectedCards[catId];

  document.getElementById('insideHeader').innerHTML = `
    <div class="inside-icon">${b.icon}</div>
    <div class="inside-header-text">
      <h2>${b.fullLabel}</h2>
      <p>${b.desc} Kies één beleidskaart.</p>
    </div>
    <button class="back-btn" onclick="leaveBuilding()">← Terug naar straat</button>`;

  document.getElementById('insideInstruction').textContent =
    selCard ? `Je hebt al een kaart gekozen. Klik op een andere kaart om van keuze te wisselen.`
            : `Kies één van de drie beleidskaarten hieronder.`;

  document.getElementById('cardsGrid').innerHTML = catCards.map(card => {
    const isSel   = selCard === card.id;
    const isClash = !isSel && blocked.has(card.id);
    const pills   = Object.entries(card.impacts).map(([t,v]) => {
      const p = THEME_PILL[t];
      return `<span class="impact-pill" style="background:${p.bg};color:${p.text}">${v>0?'+':''}${v} ${t}</span>`;
    }).join('');
    return `
      <div class="card ${isSel?'selected':''} ${isClash?'clash':''}"
           style="background:linear-gradient(160deg,${card.color})"
           onclick="pickCard('${catId}',${card.id})">
        <div class="card-badge"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        <div class="card-hdr"><span class="card-hdr-icon">${card.icon}</span><span class="card-num">#${String(card.id).padStart(2,'0')}</span></div>
        <div class="card-icon-wrap"><div class="card-big-icon">${card.icon}</div></div>
        <div class="card-body">
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc}</div>
          <div class="card-impacts">${pills}</div>
        </div>
        ${isClash?`<div class="clash-bar">⚡ ${blocked.get(card.id)||''}</div>`:''}
      </div>`;
  }).join('');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.toggle('ready', !!selCard);
}

function pickCard(catId, cardId) {
  openCardPopup(catId, cardId);
}

/* ══════════════════════════════════
   POLAR CHART
══════════════════════════════════ */
let resAnim = null;
let resCurrent = THEMES.map(() => BASELINE);

function drawPolar(canvas, data, isGoal) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const cx=W/2, cy=H/2, maxR=Math.min(W,H)*0.30;
  const MAX=10, N=THEMES.length, step=(Math.PI*2)/N;
  const sa = -Math.PI/2 - step/2;
  const fills = isGoal ? THEME_FILL_G : THEME_FILL;

  for (let r=2;r<=MAX;r+=2) { const rr=maxR*(r/MAX); ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.strokeStyle='rgba(180,210,180,0.4)'; ctx.lineWidth=0.8; ctx.stroke(); }
  for (let i=0;i<N;i++) {
    const a0=sa+i*step, a1=a0+step, r=maxR*(clamp(data[i])/MAX);
    if (r>1) {
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
      ctx.fillStyle=fills[i]; ctx.fill();
      if (!isGoal) for (let rr=2;rr<=MAX;rr+=2) { const rrr=maxR*(rr/MAX); if(rrr<r){ctx.beginPath();ctx.arc(cx,cy,rrr,a0,a1);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.2;ctx.stroke();} }
      ctx.beginPath(); ctx.arc(cx,cy,r,a0,a1); ctx.strokeStyle=isGoal?THEME_COLORS[i]+'88':THEME_COLORS[i]; ctx.lineWidth=isGoal?1:1.8; ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a1)*maxR,cy+Math.sin(a1)*maxR); ctx.strokeStyle='rgba(180,210,180,0.45)'; ctx.lineWidth=0.7; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2); ctx.strokeStyle='rgba(150,190,150,0.35)'; ctx.lineWidth=1; ctx.stroke();
  if (isGoal) { ctx.setLineDash([3,3]); ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2); ctx.strokeStyle='rgba(21,101,192,0.25)'; ctx.lineWidth=1.5; ctx.stroke(); ctx.setLineDash([]); }
  const ns=Math.max(8,Math.round(maxR*0.1)); ctx.font=`500 ${ns}px DM Sans,sans-serif`; ctx.fillStyle='#9ac09e'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  for (let r=2;r<=MAX;r+=2) { const rr=maxR*(r/MAX); ctx.fillText(String(r),cx+3,cy-rr+1); }
  const lr=maxR+maxR*0.35, is=Math.max(14,Math.round(maxR*0.24)); ctx.font=`${is}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  for (let i=0;i<N;i++) { const m=sa+i*step+step/2; ctx.fillText(THEME_ICONS[i],cx+Math.cos(m)*lr,cy+Math.sin(m)*lr); }
  ctx.beginPath(); ctx.arc(cx,cy,maxR*0.065,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
}

function animateResult(target) {
  if (resAnim) cancelAnimationFrame(resAnim);
  const start=resCurrent.slice(), t0=performance.now(), dur=600;
  function step(now) {
    const t=Math.min((now-t0)/dur,1), ease=1-Math.pow(1-t,3);
    resCurrent=start.map((s,i)=>s+(target[i]-s)*ease);
    drawPolar(document.getElementById('resultChart'),resCurrent,false);
    if(t<1) resAnim=requestAnimationFrame(step);
    else { resCurrent=target.slice(); drawPolar(document.getElementById('resultChart'),resCurrent,false); }
  }
  resAnim=requestAnimationFrame(step);
}

/* ══════════════════════════════════
   RESULTS
══════════════════════════════════ */
function renderResults() {
  const scores   = getScores();
  const goalData = THEMES.map(t => GOAL[t]);
  const resData  = THEMES.map(t => clamp(scores[t]||0));
  const pct      = calcMatch(scores);
  const ids      = getSelectedIds();

  // title
  const tEl = document.getElementById('resultsTitle');
  const sEl = document.getElementById('resultsSubtitle');
  if (pct>=80) { tEl.textContent='🎉 Uitstekend resultaat!'; sEl.textContent='Jouw keuzes sluiten nauw aan bij de bedrijfsdoelen.'; }
  else if (pct>=60) { tEl.textContent='👍 Goed op weg!'; sEl.textContent='Je keuzes komen goed overeen — met nog wat ruimte om te groeien.'; }
  else if (pct>=40) { tEl.textContent='⚖️ Gemengd resultaat'; sEl.textContent='Je raakt sommige doelen maar wijkt op andere thema\'s sterk af.'; }
  else { tEl.textContent='🔄 Ver van het doel'; sEl.textContent='Jouw beleidskeuzes wijken sterk af. Ga terug en probeer het opnieuw!'; }

  // draw charts after brief delay (DOM settle)
  setTimeout(() => {
    drawPolar(document.getElementById('goalChart'), goalData, true);
    animateResult(resData);
    // match bar
    document.getElementById('matchPct').textContent = pct+'%';
    document.getElementById('matchPct').style.color = matchColor(pct);
    document.getElementById('matchFill').style.width = pct+'%';
    document.getElementById('matchFill').style.background = matchColor(pct);
  }, 80);

  // personal summary
  const summaryEl = document.getElementById('personalSummary');
  const selCards = ids.map(id => CARDS.find(c => c.id === id)).filter(Boolean);
  if (selCards.length > 0) {
    summaryEl.innerHTML = `
      <div class="personal-summary-title">🧑 Wat verandert er voor jou?</div>
      <div class="personal-summary-cards">
        ${selCards.map(card => {
          const parts = card.info.split('🧑');
          const personalRaw = parts[1] ? parts[1].replace(/^[^?]*\?/, '').trim() : '';
          if (!personalRaw) return '';
          return `
            <div class="summary-item">
              <div class="summary-icon">${card.icon}</div>
              <div class="summary-text">
                <div class="summary-card-title">${card.title}</div>
                <div class="summary-card-personal">${personalRaw}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }
  // legend
  document.getElementById('rLegend').innerHTML = THEMES.map((t,i)=>
    `<div class="r-legend-item"><span class="ldot" style="background:${THEME_COLORS[i]}"></span>${THEME_ICONS[i]} ${t}</div>`).join('');

  // picked cards — speelkaart stijl, 3 naast elkaar
  document.getElementById('picksList').innerHTML = ids.length === 0
    ? '<p style="color:#9ac09e;font-size:13px;font-style:italic">Nog geen kaarten gekozen.</p>'
    : `<div class="picks-card-grid">${ids.map(id => {
        const card = CARDS.find(c=>c.id===id);
        if (!card) return '';
        const bld = BUILDINGS.find(b=>b.id===card.cat);
        const pills = Object.entries(card.impacts).map(([t,v])=>{
          const p=THEME_PILL[t];
          return `<span class="impact-pill" style="background:${p.bg};color:${p.text};font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;white-space:nowrap">${v>0?'+':''}${v} ${t}</span>`;
        }).join('');
        return `
          <div class="result-card" style="background:linear-gradient(160deg,${card.color})">
            <div class="result-card-hdr">
              <span style="font-size:13px">${card.icon}</span>
              <span style="font-size:8px;font-weight:700;color:rgba(255,255,255,0.4)">${bld?.label||''}</span>
            </div>
            <div class="result-card-icon">${card.icon}</div>
            <div class="result-card-body">
              <div class="result-card-title">${card.title}</div>
              <div class="result-card-desc">${card.desc}</div>
              <div class="result-card-impacts">${pills}</div>
            </div>
          </div>`;
      }).join('')}</div>`;

  // bars
  document.getElementById('themeBars').innerHTML = THEMES.map((t,i) => {
    const val=clamp(scores[t]||0), goal=GOAL[t];
    return `<div class="th-row">
      <span class="th-icon">${THEME_ICONS[i]}</span>
      <span class="th-name">${t}</span>
      <div class="th-bars">
        <div class="b-row"><span class="b-tag">Doel</span><div class="b-bg"><div class="b-bar" style="width:${goal*10}%;background:${THEME_COLORS[i]}44"></div></div><span class="b-val" style="color:${THEME_COLORS[i]}88">${goal}</span></div>
        <div class="b-row"><span class="b-tag">Jij</span><div class="b-bg"><div class="b-bar" id="rb${i}" style="width:0%;background:${THEME_COLORS[i]}"></div></div><span class="b-val">${val}</span></div>
      </div>
    </div>`;
  }).join('');
  setTimeout(()=>{ THEMES.forEach((_,i)=>{ const b=document.getElementById('rb'+i); if(b) b.style.width=clamp(getScores()[THEMES[i]]||0)*10+'%'; }); },350);

  // resize observers for charts
  const goC=document.getElementById('goalChart');
  const reC=document.getElementById('resultChart');
  new ResizeObserver(()=>drawPolar(goC,goalData,true)).observe(goC.parentElement);
  new ResizeObserver(()=>drawPolar(reC,resCurrent,false)).observe(reC.parentElement);
}

/* ══════════════════════════════════
   CARD INFO POPUP
══════════════════════════════════ */
let popupCatId = null;
let popupCardId = null;

function openCardPopup(catId, cardId) {
  const card = CARDS.find(c => c.id === cardId);
  const bld  = BUILDINGS.find(b => b.id === catId);
  if (!card) return;
  popupCatId  = catId;
  popupCardId = cardId;

  const pills = Object.entries(card.impacts).map(([t,v]) => {
    const p = THEME_PILL[t];
    return `<span class="impact-pill" style="background:${p.bg};color:${p.text};font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700">${v>0?'+':''}${v} ${t}</span>`;
  }).join('');

  // extract first colour from gradient for icon bg
  const parts = card.info.split('🧑');
  const policyText = parts[0].trim();
  const personalText = parts[1] ? parts[1].replace(/^[^?]*\?/, '').trim() : '';
  const bgColor = card.color.split(',')[0];

  document.getElementById('popupContent').innerHTML = `
    <div class="popup-card-header">
      <div class="popup-big-icon" style="background:linear-gradient(135deg,${card.color})">${card.icon}</div>
      <div class="popup-header-text">
        <div class="popup-cat">${bld?.icon} ${bld?.fullLabel}</div>
        <div class="popup-title">${card.title}</div>
        <div class="popup-desc">${card.desc}</div>
      </div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-info">${policyText}</div>
    <div class="popup-personal">
      <div class="popup-personal-label">🧑 Wat betekent dit voor jou?</div>
      <div class="popup-personal-text">${personalText}</div>
    </div>
    <div class="popup-impacts">${pills}</div>
    <div class="popup-actions">
      <button class="popup-btn-back" onclick="closePopup()">← Terug</button>
      <button class="popup-btn-claim" onclick="claimCard()">✓ Kies deze kaart →</button>
    </div>`;

  document.getElementById('popupOverlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('open');
  popupCatId = null; popupCardId = null;
}

function claimCard() {
  if (!popupCatId || !popupCardId) return;
  selectedCards[popupCatId] = popupCardId;
  closePopup();
  // go back to street with a brief delay for the popup close animation
  setTimeout(() => {
    leaveBuilding();
  }, 250);
}

// close on overlay click
document.getElementById('popupOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
renderStreet();
</script>
